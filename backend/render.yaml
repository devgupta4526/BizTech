# Render Blueprint — set DATABASE_URL and FRONTEND_URL in the Render dashboard (secrets).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: factory-dashboard-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
